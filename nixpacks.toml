# Nixpacks 配置文件 - 走默认 PHP 模板
#
# 启动方式：用 PHP 内置服务器（php -S）+ router.php 路由脚本
#   - 单个 PHP 进程，零外部依赖（不需要 nginx / php-fpm / systemd）
#   - 静态文件由 PHP 内置服务器直接返回
#   - 动态请求统一走 index.php
#   - 永远不会出现 502 Bad Gateway 或 404（router.php 已处理）
#
# 为什么不用 nginx + php-fpm：
#   - Nixpacks 默认 PHP 模板的 start 命令会调 node 渲染 nginx 模板，
#     然后用 php-fpm + nginx 启动。我们之前的 [start] 段不一定生效，
#     默认命令跑起来后 /install /health 等非 PHP 路径全部 404。
#   - 改用 php -S 一行命令搞定，最稳。

providers = ["php"]

# ====================
# 安装阶段：明确安装 PHP + Composer
# 不再需要 nginx、nodejs。
# ====================
[phases.setup]
nixPkgs = ["php82", "php82Packages.composer"]

# ====================
# 安装阶段：跳过 npm ci
# 项目根有 package.json（playwright 测试依赖），但部署不需要 node_modules。
# ====================
[phases.install]
cmds = []

# ====================
# 构建阶段：把 backend/ 内容复制到 /app
# 步骤：
#   1) 把 /app/backend/ 备份到 /tmp
#   2) 清空 /app（保留目录）
#   3) 把备份里的内容拷回 /app/
# 4) 验证关键文件存在
# ====================
[phases.build]
cmds = [
    "set -e",
    "echo '--- before cleanup: /app contents ---'",
    "ls -la /app | head -20",
    "cp -r /app/backend /tmp/_sms_backend",
    "rm -rf /app && mkdir -p /app",
    "cp -r /tmp/_sms_backend/. /app/",
    "rm -rf /tmp/_sms_backend",
    "chmod -R 755 /app",
    "echo '--- /app contents (after build) ---'",
    "ls -la /app | head -20",
    "echo '--- verify critical files ---'",
    "ls -la /app/index.php /app/router.php /app/database.sql 2>&1",
    "echo '--- php version ---'",
    "php -v",
    "echo '--- php modules ---'",
    "php -m | grep -iE 'pdo|mysql|bcmath|curl|mbstring|openssl|xml|zip' || true",
]

# ====================
# 启动阶段：PHP 内置服务器
# 用 [start] 段覆盖默认 start 命令
# -S 0.0.0.0:${PORT} 监听所有网络接口
# -t /app  设置文档根目录
# router.php  路由脚本（静态文件直接返回，其余转发到 index.php）
# ====================
[start]
cmd = "php -S 0.0.0.0:${PORT} -t /app /app/router.php"

[variables]
# Nixpacks 默认会把 PORT 注入到环境变量，php 内置服务器读取它
PORT = "80"
