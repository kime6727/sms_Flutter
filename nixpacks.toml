# Nixpacks 配置文件
# 显式声明 PHP，避免 Nixpacks 误判为 Node.js

providers = ["php"]

# ====================
# 安装阶段
# ====================
# nixpkgs 的 php82 已经内置 pdo_mysql / mysqli / bcmath / curl / mbstring /
# openssl / pdo / xml / zip 等常用扩展，无需单独指定 xxx-bcmath 这种包。
# nix 中 PHP 扩展包不存在独立名字（早期 php72-bcmath 命名已废弃）。
[phases.setup]
nixPkgs = ["php82", "nginx"]

# ====================
# 构建阶段：把 backend/ 内容复制到 /app
# ====================
[phases.build]
cmds = [
    "rm -rf /app",
    "mkdir -p /app",
    "cp -r backend/. /app/",
    "chmod -R 755 /app",
    "echo '--- /app contents ---'",
    "ls -la /app | head -20",
    "echo '--- php version ---'",
    "php -v",
    "echo '--- php modules ---'",
    "php -m | grep -iE 'pdo|mysql|bcmath|curl|mbstring|openssl|xml|zip'",
]

# ====================
# 启动阶段：php 内置服务器
# ====================
# PHP 7.4+ 内置服务器会自动把未匹配的文件请求路由到 index.php，
# 这正好替代了 nginx 的 try_files 规则，
# 解决 /health /api/health 等路径 404 的问题。
[phases.start]
cmd = "php -S 0.0.0.0:${PORT:-80} -t /app"

[variables]
PORT = "80"
