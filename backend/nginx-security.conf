# nginx 安全配置 - 保护敏感文件
# 将此配置包含到站点的 nginx 配置中

# 禁止访问 .env 文件
location ~ /\.env {
    deny all;
    return 403;
}

# 禁止访问 .git 目录
location ~ /\.git {
    deny all;
    return 403;
}

# 禁止访问 .htaccess 文件
location ~ /\.ht {
    deny all;
    return 403;
}

# 禁止访问配置文件
location ~ /(config|database)\.php$ {
    deny all;
    return 403;
}

# 禁止访问 SQL 文件
location ~ \.(sql|sql\.zip)$ {
    deny all;
    return 403;
}

# 禁止访问备份文件
location ~ \.(bak|backup|old|swp)$ {
    deny all;
    return 403;
}
