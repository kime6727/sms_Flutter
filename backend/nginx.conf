server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /app;
    index index.php index.html;

    # 客户端请求体上限
    client_max_body_size 8M;

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ----------------------------------------------------------------
    # 禁止访问敏感文件
    # ----------------------------------------------------------------
    location ~ /\.env {
        deny all;
        return 403;
    }
    location ~ /\.git {
        deny all;
        return 403;
    }
    location ~ /\.ht {
        deny all;
        return 403;
    }
    location ~ /(config|database)\.php$ {
        deny all;
        return 403;
    }
    location ~ \.(sql|sql\.zip)$ {
        deny all;
        return 403;
    }
    location ~ \.(bak|backup|old|swp)$ {
        deny all;
        return 403;
    }
    location ^~ /scripts/ {
        deny all;
        return 403;
    }
    location ^~ /cron/ {
        deny all;
        return 403;
    }

    # ----------------------------------------------------------------
    # 静态资源直出
    # ----------------------------------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # uploads 目录直出
    location ^~ /uploads/ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    # ----------------------------------------------------------------
    # 关键：把未知路径全部重写到 index.php
    # （替代 .htaccess 的 RewriteRule ^(.*)$ index.php?url=$1 [QSA,L]）
    # ----------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ----------------------------------------------------------------
    # 处理 index.php 入口
    # 支持 /api/health 形式：URL 含 /api 前缀时由 index.php 自己剥离
    # ----------------------------------------------------------------
    location = /index.php {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # 兜底：所有 .php 请求也走 FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }
}
