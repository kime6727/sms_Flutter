# nginx 主配置 - 覆盖 Nixpacks 默认配置
# 关键：把 /health /install /api/* 等所有非静态请求都路由到 index.php

worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 8M;
    index index.php;

    server {
        listen 80 default_server;
        server_name _;
        root /app;

        # 禁止访问敏感文件
        location ~ /\.(?!well-known) {
            deny all;
        }
        location ~ ^/(cron|tests|scripts|lib)/ {
            deny all;
        }

        # 静态文件直接返回
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|map|html)$ {
            expires 7d;
            access_log off;
            try_files $uri =404;
        }

        # 所有其他请求 → 路由到 index.php
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP 处理
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_read_timeout 60;
        }
    }
}
