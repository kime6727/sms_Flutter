# Nixpacks 自定义 nginx 配置 - 替代 /assets/nginx.template.conf
# 所有非静态文件请求都路由到 /index.php（标准 PHP 应用的做法）
#
# ${PORT} 会被 Nixpacks 的 prestart.mjs 替换成环境变量的值

server {
    listen ${PORT};
    server_name _;

    root /app;
    index index.php;

    # 日志
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 客户端设置
    client_max_body_size 8M;

    # 安全：禁止访问敏感文件
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ ^/(cron|tests|scripts)/ {
        deny all;
    }

    # 静态文件直接返回
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|map|html)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # 所有其他请求 → 路由到 index.php（保持现有 API 路由逻辑）
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 处理
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 60;
    }
}
